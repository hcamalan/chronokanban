    <meta
      name="description"
      content="A local-first Kanban board with built-in time tracking, analytics dashboards, and a calendar view — running entirely in your browser, with no account and no server."
    />

      name="twitter:description"
      content="A local-first Kanban board with built-in time tracking, analytics dashboards, and a calendar view — running entirely in your browser, with no account and no server."
    />
    <meta name="twitter:image" content="https://hcamalan.github.io/chronokanban/pwa-512x512.png" />
    <script>
      (function () {
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        var dark = prefersDark
        try {
          var stored = JSON.parse(localStorage.getItem('chrono-kanban-preferences'))
          if (stored && typeof stored.darkMode === 'boolean') dark = stored.darkMode
        } catch (e) {}
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
